<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NexusAR — Visor AR</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image.prod.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0515;
  --purple: #b14cf5;
  --pink: #ff4d9e;
  --cyan: #4dffdf;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --text: #fff;
  --text-dim: rgba(255,255,255,0.6);
}
html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Sora', sans-serif; color: var(--text); }

/* PANTALLA INICIO */
#startScreen {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 20%, rgba(177,76,245,0.2) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 80%, rgba(77,158,255,0.2) 0%, transparent 50%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem; text-align: center; gap: 1.5rem;
}
.logo {
  font-size: 2.5rem; font-weight: 700;
  background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.start-card {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px; padding: 2rem; max-width: 360px; width: 100%;
  backdrop-filter: blur(20px);
}
.start-icon { font-size: 3.5rem; margin-bottom: 1rem; }
.start-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; }
.start-desc { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; }
.btn-start {
  width: 100%; padding: 1.1rem; border-radius: 16px; border: none;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white; font-family: 'Sora', sans-serif;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: all .3s; box-shadow: 0 4px 20px rgba(177,76,245,0.4);
}
.btn-start:hover { transform: translateY(-2px); }
.btn-start:disabled { opacity: 0.6; cursor: wait; }

/* AR CONTAINER */
#arContainer {
  position: fixed; inset: 0; z-index: 10; display: none;
}
#arContainer canvas {
  width: 100% !important; height: 100% !important;
}

/* HUD */
#hud {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding: 1.5rem 2rem;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  display: none; align-items: center; justify-content: space-between;
}
.hud-name {
  font-size: 1.1rem; font-weight: 600;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hud-sub { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
.hud-btns { display: flex; gap: 0.6rem; }
.hud-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
  color: white; font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .2s;
}
.hud-btn:hover { background: rgba(255,255,255,0.25); }

/* BADGE */
#statusBadge {
  position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
  z-index: 60; background: rgba(10,5,21,0.85); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 30px;
  padding: 10px 20px; font-size: 0.85rem; color: var(--text-dim);
  white-space: nowrap; display: none; transition: all .3s;
}
#statusBadge.visible { display: block; }
#statusBadge.found { border-color: var(--cyan); color: var(--cyan); }

/* TOAST */
#toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  z-index: 200; background: rgba(10,5,21,0.9); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 30px;
  padding: 12px 24px; font-size: 0.88rem; color: var(--text);
  white-space: nowrap; opacity: 0; transition: opacity .3s; pointer-events: none;
}
#toast.show { opacity: 1; }

/* NO DATA */
#noData {
  position: fixed; inset: 0; z-index: 100; background: var(--bg);
  display: none; flex-direction: column; align-items: center;
  justify-content: center; gap: 1rem; padding: 2rem; text-align: center;
}
</style>
</head>
<body>

<!-- INICIO -->
<div id="startScreen">
  <div class="logo">NexusAR</div>
  <div class="start-card">
    <div class="start-icon">🎯</div>
    <div class="start-title" id="expName">Experiencia AR</div>
    <p class="start-desc">Apunta tu cámara a la imagen de referencia y el contenido AR aparecerá automáticamente sobre ella.</p>
  </div>
  <button class="btn-start" id="startBtn" onclick="startAR()">📸 Iniciar escaneo</button>
</div>

<!-- NO DATA -->
<div id="noData">
  <div style="font-size:4rem;opacity:.4">😕</div>
  <p style="font-size:1.1rem;font-weight:600">No se encontró la experiencia</p>
  <a href="index.html" style="color:var(--cyan);font-size:.9rem;margin-top:1rem">← Ir al inicio</a>
</div>

<!-- AR -->
<div id="arContainer"></div>

<!-- BADGE -->
<div id="statusBadge"></div>

<!-- HUD -->
<div id="hud">
  <div>
    <div class="hud-name" id="hudName">NexusAR</div>
    <div class="hud-sub">en realidad aumentada</div>
  </div>
  <div class="hud-btns">
    <button class="hud-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
    <button class="hud-btn" onclick="stopAR()">✕</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════
//  DATOS
// ════════════════════════════════════════════
const hash = location.hash.slice(1);
let payload = null;
let expName = 'Experiencia AR';
let mindarThree = null;
let videoEl = null;
let isMuted = false;
let isTracking = false;

function loadExperience() {
  if (!hash) { payload = null; return; }
  try {
    const data = JSON.parse(decodeURIComponent(atob(hash)));
    if (data.name && data.img && data.vid) {
      payload = { name: data.name, imgURL: data.img, vidURL: data.vid, mindURL: data.mind || null };
      expName = data.name;
      document.getElementById('expName').textContent = expName;
      document.getElementById('hudName').textContent = expName;
    } else { showNoData(); }
  } catch(e) { showNoData(); }
}

function showNoData() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('noData').style.display = 'flex';
}

// ════════════════════════════════════════════
//  INICIAR AR
// ════════════════════════════════════════════
async function startAR() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Iniciando...';

  try {
    // Cargar experiencias del backend si no hay payload con .mind
    if (!payload?.mindURL) {
      btn.textContent = 'Cargando...';
      const res = await fetch('https://nexusar-backend.onrender.com/api/get-experiences');
      const exps = await res.json();
      const mindExp = exps.find(e => e.mindURL);
      if (mindExp) {
        payload = mindExp;
        document.getElementById('expName').textContent = payload.name;
        document.getElementById('hudName').textContent = payload.name;
      } else {
        startLegacyScanner(exps);
        return;
      }
    }
    startMindAR();
  } catch(e) {
    console.error(e);
    showToast('Error al iniciar. Intenta de nuevo.');
    btn.disabled = false;
    btn.textContent = '📸 Iniciar escaneo';
  }
}

// ════════════════════════════════════════════
//  MINDAR CON THREE.JS (sin A-Frame)
// ════════════════════════════════════════════
async function startMindAR() {
  const badge = document.getElementById('statusBadge');
  badge.classList.add('visible');
  badge.textContent = '📷 Iniciando cámara...';

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('arContainer').style.display = 'block';
  document.getElementById('hud').style.display = 'flex';

  try {
    // Crear video elemento para el video AR
    videoEl = document.createElement('video');
    videoEl.src = payload.vidURL;
    videoEl.loop = true;
    videoEl.muted = false;
    videoEl.playsInline = true;
    videoEl.crossOrigin = 'anonymous';
    videoEl.preload = 'auto';

    // Inicializar MindAR con Three.js
    const container = document.getElementById('arContainer');

    mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: container,
      imageTargetSrc: payload.mindURL,
      uiLoading: 'no',
      uiScanning: 'no',
      uiError: 'no',
    });

    const { renderer, scene, camera } = mindarThree;

    // Crear textura del video
    const texture = new THREE.VideoTexture(videoEl);
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;

    // Crear plano con el video
    const geometry = new THREE.PlaneGeometry(1, 9/16);
    const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.FrontSide });
    const plane = new THREE.Mesh(geometry, material);

    // Agregar a la escena anclado al target
    const anchor = mindarThree.addAnchor(0);
    anchor.group.add(plane);

    // Eventos de detección
    anchor.onTargetFound = () => {
      isTracking = true;
      badge.textContent = '✓ ¡Imagen detectada!';
      badge.classList.add('found');
      setTimeout(() => badge.classList.remove('visible'), 2000);

      videoEl.muted = isMuted;
      videoEl.play().catch(() => {
        videoEl.muted = true;
        isMuted = true;
        document.getElementById('muteBtn').textContent = '🔇';
        videoEl.play();
        showToast('Toca 🔊 para activar sonido');
      });
      showToast('¡Video AR activado! 🎉');
    };

    anchor.onTargetLost = () => {
      isTracking = false;
      badge.classList.add('visible');
      badge.classList.remove('found');
      badge.textContent = '🔍 Buscando imagen...';
      videoEl.pause();
    };

    // Iniciar MindAR
    await mindarThree.start();
    badge.textContent = '🔍 Buscando imagen...';

    // Loop de renderizado
    renderer.setAnimationLoop(() => {
      renderer.render(scene, camera);
      if (isTracking) texture.needsUpdate = true;
    });

  } catch(e) {
    console.error('Error MindAR:', e);
    badge.textContent = '❌ Error de cámara';
    showToast('Error al iniciar cámara. Intenta recargar.');
  }
}

// ════════════════════════════════════════════
//  FALLBACK - pHash scanner
// ════════════════════════════════════════════
const HASH_SIZE = 16;
const MATCH_THRESHOLD = 0.68;
const FRAMES_TO_AVERAGE = 3;
let frameCanvas, frameCtx, detectionInterval, detecting = false, stream;

function normalizeImageData(data) {
  let min = 255, max = 0;
  for (let i = 0; i < data.length; i += 4) {
    const lum = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
    if (lum < min) min = lum;
    if (lum > max) max = lum;
  }
  const range = max - min || 1;
  const result = [];
  for (let i = 0; i < data.length; i += 4) {
    result.push(((0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]) - min) / range * 255);
  }
  return result;
}

function pHash(ctx, w, h) {
  const s = document.createElement('canvas');
  s.width = HASH_SIZE; s.height = HASH_SIZE;
  const sx = s.getContext('2d');
  sx.drawImage(ctx.canvas, 0, 0, w, h, 0, 0, HASH_SIZE, HASH_SIZE);
  const data = sx.getImageData(0, 0, HASH_SIZE, HASH_SIZE).data;
  const grays = normalizeImageData(data);
  const avg = grays.reduce((a, b) => a + b, 0) / grays.length;
  return grays.map(g => g > avg ? 1 : 0);
}

function hashSimilarity(a, b) {
  let same = 0;
  for (let i = 0; i < a.length; i++) if (a[i] === b[i]) same++;
  return same / a.length;
}

function generateHashVariations(canvas) {
  const ctx = canvas.getContext('2d');
  const hashes = [pHash(ctx, canvas.width, canvas.height)];
  const c2 = document.createElement('canvas');
  c2.width = 64; c2.height = 64;
  const c2x = c2.getContext('2d');
  c2x.drawImage(canvas, 6, 6, 52, 52, 0, 0, 64, 64);
  hashes.push(pHash(c2x, 64, 64));
  const c3 = document.createElement('canvas');
  c3.width = 64; c3.height = 64;
  const c3x = c3.getContext('2d');
  c3x.filter = 'contrast(150%) brightness(110%)';
  c3x.drawImage(canvas, 0, 0, 64, 64);
  hashes.push(pHash(c3x, 64, 64));
  return hashes;
}

async function startLegacyScanner(experiences) {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';

  const badge = document.getElementById('statusBadge');
  badge.classList.add('visible');
  badge.textContent = 'Cargando cámara...';

  const camHTML = `
    <div style="position:fixed;inset:0;background:#000;">
      <video id="legacyCam" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;"></video>
      <canvas id="legacyCanvas" style="display:none;"></canvas>
    </div>`;
  document.getElementById('arContainer').innerHTML = camHTML;
  document.getElementById('arContainer').style.display = 'block';

  stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
  document.getElementById('legacyCam').srcObject = stream;

  frameCanvas = document.getElementById('legacyCanvas');
  frameCtx = frameCanvas.getContext('2d');
  frameCanvas.width = 64; frameCanvas.height = 64;

  let expHashes = [];
  badge.textContent = 'Preparando detección...';
  for (const exp of experiences) {
    const tc = document.createElement('canvas');
    const tx = tc.getContext('2d');
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = exp.imgURL;
    await new Promise(res => { img.onload = () => { tc.width = 64; tc.height = 64; tx.drawImage(img, 0, 0, 64, 64); expHashes.push({ exp, hashes: generateHashVariations(tc) }); res(); }; img.onerror = res; });
  }

  badge.textContent = 'Apunta a una imagen AR...';
  detecting = true;
  let frameBuffer = [];

  detectionInterval = setInterval(() => {
    if (!detecting) return;
    const vid = document.getElementById('legacyCam');
    if (!vid || vid.readyState < 2) return;
    frameCtx.drawImage(vid, 0, 0, 64, 64);
    const fh = pHash(frameCtx, 64, 64);
    frameBuffer.push(fh);
    if (frameBuffer.length > FRAMES_TO_AVERAGE) frameBuffer.shift();

    let bestScore = 0, bestExp = null;
    for (const { exp, hashes } of expHashes) {
      for (const rh of hashes) {
        for (const f of frameBuffer) {
          const s = hashSimilarity(rh, f);
          if (s > bestScore) { bestScore = s; bestExp = exp; }
        }
      }
    }

    badge.textContent = `Escaneando… ${Math.round(bestScore * 100)}%`;

    if (bestScore >= MATCH_THRESHOLD && bestExp) {
      badge.textContent = '✓ ¡Imagen detectada!';
      badge.classList.add('found');
      clearInterval(detectionInterval);
      detecting = false;
      payload = { ...bestExp };
      activateLegacyVideo();
    }
  }, 300);
}

function activateLegacyVideo() {
  const vid = document.createElement('video');
  vid.id = 'overlayVid';
  vid.src = payload.vidURL;
  vid.autoplay = true; vid.loop = true; vid.playsInline = true;
  vid.crossOrigin = 'anonymous';
  vid.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(90vw,440px);border-radius:16px;box-shadow:0 0 60px rgba(177,76,245,0.5);';
  document.getElementById('arContainer').querySelector('div').appendChild(vid);
  document.getElementById('hudName').textContent = payload.name;
  vid.muted = false;
  vid.play().catch(() => { vid.muted = true; vid.play(); showToast('Toca 🔊 para activar sonido'); });
  showToast('¡Video AR activado! 🎉');
}

// ════════════════════════════════════════════
//  CONTROLES
// ════════════════════════════════════════════
function toggleMute() {
  isMuted = !isMuted;
  const vid = videoEl || document.getElementById('overlayVid');
  if (vid) vid.muted = isMuted;
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
  showToast(isMuted ? 'Sonido desactivado' : 'Sonido activado');
}

async function stopAR() {
  if (mindarThree) { await mindarThree.stop(); mindarThree = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (detectionInterval) { clearInterval(detectionInterval); detecting = false; }
  if (videoEl) { videoEl.pause(); videoEl = null; }

  document.getElementById('arContainer').innerHTML = '';
  document.getElementById('arContainer').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('statusBadge').classList.remove('visible', 'found');
  document.getElementById('startScreen').style.display = 'flex';
  const btn = document.getElementById('startBtn');
  btn.disabled = false; btn.textContent = '📸 Iniciar escaneo';
}

function showToast(msg, dur = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

loadExperience();
</script>
</body>
</html>
