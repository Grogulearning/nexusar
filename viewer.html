<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NexusAR — Visor AR</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0515;
  --purple: #b14cf5;
  --pink: #ff4d9e;
  --cyan: #4dffdf;
  --blue: #4d9eff;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --text: #fff;
  --text-dim: rgba(255,255,255,0.6);
}
html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Sora', sans-serif; color: var(--text); }

/* ── PANTALLAS ── */
.screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; }
.screen.active { display: flex; }

/* ── WELCOME ── */
#welcome {
  background: var(--bg);
  background-image: radial-gradient(ellipse at 30% 20%, rgba(177,76,245,0.2) 0%, transparent 50%),
                    radial-gradient(ellipse at 70% 70%, rgba(77,158,255,0.15) 0%, transparent 50%);
  padding: 2rem; gap: 1rem;
}
.logo {
  font-size: 2.4rem; font-weight: 700; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.exp-name { font-size: 1rem; color: var(--text-dim); }
.start-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 24px; padding: 2rem; max-width: 360px; width: 100%;
  text-align: center; backdrop-filter: blur(30px);
}
.start-icon { font-size: 3rem; margin-bottom: 1rem; }
.start-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
.start-desc { font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; }
.btn-start {
  width: 100%; max-width: 360px; padding: 1.1rem; border-radius: 16px; border: none;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white; font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: all .3s; box-shadow: 0 4px 20px rgba(177,76,245,0.4);
}
.btn-start:hover { transform: translateY(-2px); }
.btn-start:disabled { opacity: 0.6; cursor: wait; transform: none; }

/* ── SCANNER ── */
#scanner { background: #000; }
#cam { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.scan-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.4) 100%);
}
.scan-frame {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
  width: min(70vw, 300px); aspect-ratio: 1;
  border: 2px solid rgba(77,255,223,0.6);
  border-radius: 16px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.4), 0 0 30px rgba(77,255,223,0.3);
}
.scan-corners::before, .scan-corners::after {
  content: ''; position: absolute; width: 24px; height: 24px;
  border-color: var(--cyan); border-style: solid;
}
.scan-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  animation: scanMove 2s ease-in-out infinite;
}
@keyframes scanMove { 0%, 100% { top: 0; } 50% { top: 100%; } }
#statusBadge {
  position: absolute; bottom: 7rem; left: 50%; transform: translateX(-50%);
  background: rgba(10,5,21,0.85); backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border); border-radius: 30px;
  padding: 10px 20px; font-size: 0.85rem; color: var(--text-dim); white-space: nowrap;
  transition: all .3s;
}
#statusBadge.found { border-color: var(--cyan); color: var(--cyan); }

/* ── AR PLAYER ── */
#arplayer { background: #000; }
#camBg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

/* VIDEO CON FRAMES */
.video-wrap {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
}

/* Frame: ninguno */
.frame-none video { border-radius: 12px; }

/* Frame: círculo */
.frame-circle { border-radius: 50%; overflow: hidden; }
.frame-circle video { width: 100%; height: 100%; object-fit: cover; }

/* Frame: rect horizontal */
.frame-rect-h { border-radius: 12px; overflow: hidden; }
.frame-rect-h video { width: 100%; height: 100%; object-fit: cover; }

/* Frame: rect vertical */
.frame-rect-v { border-radius: 12px; overflow: hidden; }
.frame-rect-v video { width: 100%; height: 100%; object-fit: cover; }

/* Frame: cuadrado */
.frame-square { border-radius: 8px; overflow: hidden; }
.frame-square video { width: 100%; height: 100%; object-fit: cover; }

/* Frame: cuadrado redondeado */
.frame-rounded { border-radius: 32px; overflow: hidden; }
.frame-rounded video { width: 100%; height: 100%; object-fit: cover; }

#arVid {
  display: block;
  box-shadow: 0 0 60px rgba(177,76,245,0.5);
  opacity: 0; transition: opacity .6s;
}
#arVid.show { opacity: 1; }

/* ── HUD ── */
.ar-controls {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
  padding: 1.2rem 2rem;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  display: flex; align-items: center; justify-content: space-between;
}
.ar-label { font-size: 0.9rem; }
.ar-label strong {
  display: block; font-size: 1rem;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.ar-btns { display: flex; gap: 0.6rem; }
.ar-btn-sm {
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
  color: white; font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .2s;
}
.ar-btn-sm:hover { background: rgba(255,255,255,0.25); }

/* ── NO DATA ── */
#nodata {
  background: var(--bg); gap: 1rem; padding: 2rem; text-align: center;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  z-index: 200; background: rgba(10,5,21,0.9); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 30px;
  padding: 12px 24px; font-size: 0.85rem;
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="logo">NexusAR</div>
  <div class="exp-name" id="expName">Cargando...</div>
  <div class="start-card">
    <div class="start-icon">🎯</div>
    <div class="start-title">Escanear imagen AR</div>
    <p class="start-desc">Apunta tu cámara a la imagen de referencia y el video aparecerá automáticamente.</p>
  </div>
  <button class="btn-start" id="startBtn" onclick="startScanner()">📸 Iniciar escaneo</button>
</div>

<!-- SCANNER -->
<div id="scanner" class="screen">
  <video id="cam" autoplay playsinline muted></video>
  <div class="scan-overlay"></div>
  <div class="scan-frame">
    <div class="scan-line"></div>
  </div>
  <div id="statusBadge">Cargando experiencias...</div>
</div>

<!-- AR PLAYER -->
<div id="arplayer" class="screen">
  <video id="camBg" autoplay playsinline muted></video>
  <div class="video-wrap" id="videoWrap">
    <video id="arVid" playsinline loop></video>
  </div>
  <div class="ar-controls">
    <div class="ar-label">
      <strong id="arTitle">Reproduciendo</strong>
      en realidad aumentada
    </div>
    <div class="ar-btns">
      <button class="ar-btn-sm" id="muteBtn" onclick="toggleMute()">🔊</button>
      <button class="ar-btn-sm" onclick="backToScanner()">📷</button>
      <button class="ar-btn-sm" onclick="stopAR()">✕</button>
    </div>
  </div>
</div>

<!-- NO DATA -->
<div id="nodata" class="screen">
  <div style="font-size:3rem;opacity:.4">😕</div>
  <p style="font-size:1.1rem;font-weight:600">No se encontró la experiencia</p>
  <p style="color:var(--text-dim);font-size:.9rem">Solicita el link correcto al creador</p>
  <a href="index.html" style="color:var(--cyan);margin-top:1rem;font-size:.9rem">← Ir al inicio</a>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════
//  ESTADO
// ════════════════════════════════════════════
const BACKEND = 'https://nexusar-backend.onrender.com';
const hash = location.hash.slice(1);
let payload = null;
let stream = null;
let detecting = false;
let detectionInterval = null;
let frameCanvas, frameCtx;
let isMuted = false;

// ════════════════════════════════════════════
//  CARGAR EXPERIENCIA
// ════════════════════════════════════════════
function loadExperience() {
  if (!hash) return; // modo libre, sin experiencia específica
  try {
    const data = JSON.parse(decodeURIComponent(atob(hash)));
    if (data.name && data.img && data.vid) {
      payload = { name: data.name, imgURL: data.img, vidURL: data.vid, shape: data.shape || 'none' };
      document.getElementById('expName').textContent = data.name;
      document.getElementById('arTitle').textContent = data.name;
    } else { goTo('nodata'); }
  } catch(e) { goTo('nodata'); }
}

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

// ════════════════════════════════════════════
//  SCANNER
// ════════════════════════════════════════════
async function startScanner() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Iniciando cámara...';

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    document.getElementById('cam').srcObject = stream;
    document.getElementById('camBg').srcObject = stream;
    goTo('scanner');
    startDetection();
  } catch(e) {
    showToast('No se pudo acceder a la cámara');
    btn.disabled = false;
    btn.textContent = '📸 Iniciar escaneo';
  }
}

// ════════════════════════════════════════════
//  DETECCIÓN - pHash
// ════════════════════════════════════════════
const HASH_SIZE = 16;
const MATCH_THRESHOLD = 0.68;
const FRAMES_TO_AVERAGE = 3;

function normalizeImageData(data) {
  let min = 255, max = 0;
  for (let i = 0; i < data.length; i += 4) {
    const lum = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
    if (lum < min) min = lum;
    if (lum > max) max = lum;
  }
  const range = max - min || 1;
  return Array.from({ length: data.length / 4 }, (_, k) => {
    const i = k * 4;
    return ((0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]) - min) / range * 255;
  });
}

function pHash(ctx, w, h) {
  const s = document.createElement('canvas');
  s.width = HASH_SIZE; s.height = HASH_SIZE;
  const sx = s.getContext('2d');
  sx.drawImage(ctx.canvas, 0, 0, w, h, 0, 0, HASH_SIZE, HASH_SIZE);
  const grays = normalizeImageData(sx.getImageData(0, 0, HASH_SIZE, HASH_SIZE).data);
  const avg = grays.reduce((a, b) => a + b, 0) / grays.length;
  return grays.map(g => g > avg ? 1 : 0);
}

function hashSim(a, b) {
  let same = 0;
  for (let i = 0; i < a.length; i++) if (a[i] === b[i]) same++;
  return same / a.length;
}

function hashVariations(canvas) {
  const ctx = canvas.getContext('2d');
  const h = [pHash(ctx, canvas.width, canvas.height)];
  // Zoom central
  const c2 = document.createElement('canvas'); c2.width = 64; c2.height = 64;
  const x2 = c2.getContext('2d'); x2.drawImage(canvas, 6, 6, 52, 52, 0, 0, 64, 64);
  h.push(pHash(x2, 64, 64));
  // Más contraste
  const c3 = document.createElement('canvas'); c3.width = 64; c3.height = 64;
  const x3 = c3.getContext('2d'); x3.filter = 'contrast(150%) brightness(110%)'; x3.drawImage(canvas, 0, 0, 64, 64);
  h.push(pHash(x3, 64, 64));
  // Menos contraste
  const c4 = document.createElement('canvas'); c4.width = 64; c4.height = 64;
  const x4 = c4.getContext('2d'); x4.filter = 'contrast(80%) brightness(90%)'; x4.drawImage(canvas, 0, 0, 64, 64);
  h.push(pHash(x4, 64, 64));
  return h;
}

async function startDetection() {
  if (!frameCanvas) {
    frameCanvas = document.createElement('canvas');
    frameCtx = frameCanvas.getContext('2d');
    frameCanvas.width = 64; frameCanvas.height = 64;
  }

  detecting = true;
  const badge = document.getElementById('statusBadge');

  // Cargar experiencias del backend
  badge.textContent = 'Cargando experiencias...';
  let experiences = [];
  try {
    const res = await fetch(`${BACKEND}/api/get-experiences`);
    experiences = await res.json();
  } catch(e) {
    badge.textContent = 'Error al cargar. Reintentando...';
    setTimeout(startDetection, 3000);
    return;
  }

  if (experiences.length === 0) {
    badge.textContent = 'No hay experiencias disponibles';
    detecting = false;
    return;
  }

  // Pre-cargar hashes de todas las imágenes
  badge.textContent = 'Preparando detección...';
  const expHashes = [];
  for (const exp of experiences) {
    const tc = document.createElement('canvas');
    tc.width = 64; tc.height = 64;
    const tx = tc.getContext('2d');
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = exp.imgURL;
    await new Promise(res => { img.onload = () => { tx.drawImage(img, 0, 0, 64, 64); expHashes.push({ exp, hashes: hashVariations(tc) }); res(); }; img.onerror = res; });
  }

  badge.textContent = 'Apunta a una imagen AR...';
  let frameBuffer = [];

  detectionInterval = setInterval(() => {
    if (!detecting) return;
    const vid = document.getElementById('cam');
    if (!vid || vid.readyState < 2) return;

    frameCtx.drawImage(vid, 0, 0, 64, 64);
    const fh = pHash(frameCtx, 64, 64);
    frameBuffer.push(fh);
    if (frameBuffer.length > FRAMES_TO_AVERAGE) frameBuffer.shift();

    let bestScore = 0, bestExp = null;
    for (const { exp, hashes } of expHashes) {
      for (const rh of hashes) {
        for (const f of frameBuffer) {
          const s = hashSim(rh, f);
          if (s > bestScore) { bestScore = s; bestExp = exp; }
        }
      }
    }

    const pct = Math.round(bestScore * 100);
    badge.textContent = `Escaneando… ${pct}%`;
    badge.classList.toggle('found', bestScore >= MATCH_THRESHOLD);

    if (bestScore >= MATCH_THRESHOLD && bestExp) {
      clearInterval(detectionInterval);
      detecting = false;
      badge.textContent = '✓ ¡Imagen detectada!';
      setTimeout(() => activateAR(bestExp), 600);
    }
  }, 300);
}

// ════════════════════════════════════════════
//  ACTIVAR AR
// ════════════════════════════════════════════
function applyShape(shape) {
  const wrap = document.getElementById('videoWrap');
  const vid = document.getElementById('arVid');

  // Limpiar clases previas
  wrap.className = 'video-wrap';

  const size = 'min(85vw, 400px)';
  const sizeSquare = 'min(75vw, 360px)';

  switch(shape) {
    case 'circle':
      wrap.style.cssText = `width:${sizeSquare};height:${sizeSquare};`;
      wrap.classList.add('frame-circle');
      vid.style.cssText = `width:100%;height:100%;`;
      break;
    case 'rect-h': // Horizontal 16:9
      wrap.style.cssText = `width:${size};height:auto;`;
      wrap.classList.add('frame-rect-h');
      vid.style.cssText = `width:100%;height:auto;aspect-ratio:16/9;`;
      break;
    case 'rect-v': // Vertical 9:16
      wrap.style.cssText = `width:min(55vw,260px);height:min(80vh,460px);`;
      wrap.classList.add('frame-rect-v');
      vid.style.cssText = `width:100%;height:100%;`;
      break;
    case 'square':
      wrap.style.cssText = `width:${sizeSquare};height:${sizeSquare};`;
      wrap.classList.add('frame-square');
      vid.style.cssText = `width:100%;height:100%;`;
      break;
    case 'rounded':
      wrap.style.cssText = `width:${size};height:auto;`;
      wrap.classList.add('frame-rounded');
      vid.style.cssText = `width:100%;height:auto;aspect-ratio:16/9;`;
      break;
    default: // none
      wrap.style.cssText = `width:${size};`;
      wrap.classList.add('frame-none');
      vid.style.cssText = `width:100%;height:auto;border-radius:12px;`;
  }
}

async function activateAR(exp) {
  const arVid = document.getElementById('arVid');
  arVid.src = exp.vidURL;
  arVid.muted = false;

  // Aplicar forma
  applyShape(exp.shape || 'none');

  document.getElementById('arTitle').textContent = exp.name;
  goTo('arplayer');

  arVid.classList.add('show');

  try {
    await arVid.play();
  } catch(e) {
    arVid.muted = true;
    isMuted = true;
    document.getElementById('muteBtn').textContent = '🔇';
    await arVid.play();
    showToast('Toca 🔊 para activar sonido');
  }

  if (!arVid.muted) showToast('¡Video AR activado! 🎉');
}

// ════════════════════════════════════════════
//  CONTROLES
// ════════════════════════════════════════════
function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('arVid').muted = isMuted;
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
  showToast(isMuted ? 'Sonido desactivado' : 'Sonido activado');
}

function backToScanner() {
  document.getElementById('arVid').pause();
  document.getElementById('arVid').classList.remove('show');
  goTo('scanner');
  detecting = true;
  startDetection();
}

function stopAR() {
  document.getElementById('arVid').pause();
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (detectionInterval) { clearInterval(detectionInterval); detecting = false; }
  document.getElementById('arVid').classList.remove('show');
  const btn = document.getElementById('startBtn');
  btn.disabled = false;
  btn.textContent = '📸 Iniciar escaneo';
  goTo('welcome');
}

function showToast(msg, dur = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

loadExperience();
</script>
</body>
</html>
