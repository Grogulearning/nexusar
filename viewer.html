<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NexusAR — Visor AR</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- MindAR + A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0515;
  --purple: #b14cf5;
  --pink: #ff4d9e;
  --cyan: #4dffdf;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.6);
}

html, body { 
  height: 100%; overflow: hidden; 
  background: #000; 
  font-family: 'Sora', sans-serif; 
  color: var(--text); 
}

/* ── PANTALLA DE INICIO ── */
#startScreen {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  background-image: 
    radial-gradient(ellipse at 20% 20%, rgba(177,76,245,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(77,158,255,0.2) 0%, transparent 50%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem; text-align: center; gap: 1.5rem;
}

.logo {
  font-size: 2.5rem; font-weight: 700; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.start-card {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px; padding: 2rem; max-width: 360px; width: 100%;
  backdrop-filter: blur(20px);
}

.start-icon { font-size: 3.5rem; margin-bottom: 1rem; }
.start-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; }
.start-desc { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; }

.btn-start {
  width: 100%; padding: 1.1rem; border-radius: 16px; border: none;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white; font-family: 'Sora', sans-serif;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: all .3s; box-shadow: 0 4px 20px rgba(177,76,245,0.4);
  display: flex; align-items: center; justify-content: center; gap: 0.6rem;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(177,76,245,0.5); }
.btn-start:disabled { opacity: 0.6; transform: none; cursor: wait; }

/* ── NO DATA ── */
#noData {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg); display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 1rem; padding: 2rem; text-align: center;
}
.no-data-icon { font-size: 4rem; opacity: 0.4; }

/* ── A-FRAME SCENE ── */
#arScene {
  position: fixed; inset: 0; z-index: 10;
  display: none;
}

/* ── HUD (Heads-Up Display) ── */
#hud {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding: 1.5rem 2rem;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  display: none;
  align-items: center; justify-content: space-between;
}
.hud-info { }
.hud-name {
  font-size: 1.1rem; font-weight: 600;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hud-sub { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
.hud-btns { display: flex; gap: 0.6rem; }
.hud-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
  color: white; font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.hud-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }

/* ── BADGE DE ESTADO ── */
#statusBadge {
  position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
  z-index: 60; background: rgba(10,5,21,0.85); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 30px;
  padding: 10px 20px; font-size: 0.85rem; color: var(--text-dim);
  white-space: nowrap; display: none;
  transition: all .3s;
}
#statusBadge.visible { display: block; }
#statusBadge.found { 
  border-color: var(--cyan); color: var(--cyan);
  box-shadow: 0 0 20px rgba(77,255,223,0.3);
}
#statusBadge.lost { 
  border-color: var(--text-dim); color: var(--text-dim);
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  z-index: 200; background: rgba(10,5,21,0.9); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 30px;
  padding: 12px 24px; font-size: 0.88rem; color: var(--text);
  white-space: nowrap; opacity: 0; transition: opacity .3s; pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- PANTALLA DE INICIO -->
<div id="startScreen">
  <div class="logo">NexusAR</div>
  <div class="start-card">
    <div class="start-icon">🎯</div>
    <div class="start-title" id="expName">Experiencia AR</div>
    <p class="start-desc">Apunta tu cámara a la imagen de referencia y el contenido AR aparecerá automáticamente sobre ella.</p>
  </div>
  <button class="btn-start" id="startBtn" onclick="startAR()">
    📸 Iniciar escaneo
  </button>
</div>

<!-- SIN DATOS -->
<div id="noData" style="display:none; flex-direction:column; align-items:center; justify-content:center; position:fixed; inset:0; z-index:100; background:var(--bg);">
  <div class="no-data-icon">😕</div>
  <p style="font-size:1.1rem; font-weight:600;">No se encontró la experiencia AR</p>
  <p style="color:var(--text-dim); font-size:0.9rem; margin-top:0.5rem;">Solicita el link correcto al creador</p>
  <a href="index.html" style="margin-top:1.5rem; color:var(--cyan); font-size:0.9rem;">← Ir al inicio</a>
</div>

<!-- BADGE DE ESTADO -->
<div id="statusBadge"></div>

<!-- ESCENA AR (se llena dinámicamente) -->
<div id="arScene"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-info">
    <div class="hud-name" id="hudName">NexusAR</div>
    <div class="hud-sub">en realidad aumentada</div>
  </div>
  <div class="hud-btns">
    <button class="hud-btn" id="muteBtn" onclick="toggleMute()" title="Sonido">🔊</button>
    <button class="hud-btn" onclick="stopAR()" title="Cerrar">✕</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════
//  CARGAR DATOS DE LA EXPERIENCIA
// ════════════════════════════════════════════
const hash = location.hash.slice(1);
let payload = null;
let expName = 'Experiencia AR';
let mindARSystem = null;
let isMuted = false;

function loadExperience() {
  if (!hash) {
    // Modo escaneo libre - necesita backend
    payload = null;
    return;
  }

  try {
    const decoded = decodeURIComponent(atob(hash));
    const data = JSON.parse(decoded);

    if (data.name && data.img && data.vid) {
      payload = {
        name: data.name,
        imgURL: data.img,
        vidURL: data.vid,
        mindURL: data.mind || null,
        shape: data.shape || 'none'
      };
      expName = data.name;
      document.getElementById('expName').textContent = expName;
      document.getElementById('hudName').textContent = expName;
    } else {
      showNoData();
    }
  } catch(e) {
    console.error('Error:', e);
    showNoData();
  }
}

function showNoData() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('noData').style.display = 'flex';
}

// ════════════════════════════════════════════
//  INICIAR AR CON MINDAR
// ════════════════════════════════════════════
async function startAR() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Iniciando cámara...';

  try {
    // Si tiene archivo .mind, usar MindAR tracking real
    if (payload && payload.mindURL) {
      startMindAR();
    } else {
      // Sin .mind = cargar experiencias del backend y escanear
      btn.textContent = 'Cargando experiencias...';
      const response = await fetch('https://nexusar-backend-production.up.railway.app/api/get-experiences');
      const experiences = await response.json();
      
      if (experiences.length === 0) {
        showToast('No hay experiencias disponibles');
        btn.disabled = false;
        btn.textContent = '📸 Iniciar escaneo';
        return;
      }

      // Buscar si alguna experiencia tiene .mind
      const mindExp = experiences.find(e => e.mindURL);
      if (mindExp) {
        payload = mindExp;
        startMindAR();
      } else {
        // Fallback: escaneo con pHash
        startLegacyScanner(experiences);
      }
    }
  } catch(e) {
    console.error(e);
    showToast('Error al iniciar AR');
    btn.disabled = false;
    btn.textContent = '📸 Iniciar escaneo';
  }
}

// ════════════════════════════════════════════
//  MINDAR - TRACKING PROFESIONAL
// ════════════════════════════════════════════
function startMindAR() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hudName').textContent = payload.name;

  const badge = document.getElementById('statusBadge');
  badge.classList.add('visible');
  badge.textContent = '🔍 Buscando imagen...';

  const shape = payload.shape || 'none';

  // Siempre usar a-video (más estable con MindAR)
  const sceneHTML = `
    <a-scene
      id="mindScene"
      mindar-image="imageTargetSrc: ${payload.mindURL}; autoStart: true; uiError: no; uiScanning: no; filterMinCF: 0.001; filterBeta: 0.01; missTolerance: 5; warmupTolerance: 3;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="position:fixed;inset:0;z-index:10;"
    >
      <a-assets>
        <video 
          id="arVideo" 
          src="${payload.vidURL}" 
          preload="auto" 
          loop 
          playsinline 
          crossorigin="anonymous"
          webkit-playsinline
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video 
          src="#arVideo" 
          position="0 0 0.001" 
          width="1" 
          height="0.552"
          rotation="0 0 0"
        ></a-video>
      </a-entity>
    </a-scene>
  `;

  document.getElementById('arScene').innerHTML = sceneHTML;
  document.getElementById('arScene').style.display = 'block';

  // Esperar a que la escena esté lista
  setTimeout(() => {
    const scene = document.getElementById('mindScene');
    if (!scene) return;

    // Timeout para detectar si la cámara no inició
    let cameraStarted = false;
    setTimeout(() => {
      if (!cameraStarted) {
        badge.textContent = '📷 Iniciando cámara...';
      }
    }, 3000);

    scene.addEventListener('arReady', () => {
      cameraStarted = true;
      console.log('MindAR listo');
      badge.textContent = '🔍 Buscando imagen...';
    });

    scene.addEventListener('arError', (e) => {
      console.error('MindAR error:', e);
      badge.textContent = '❌ Error al iniciar cámara';
      showToast('Error al iniciar AR. Intenta recargar la página.');
    });

    // Detectar cuando encuentra/pierde la imagen
    const target = scene.querySelector('[mindar-image-target]');
    if (target) {
      target.addEventListener('targetFound', () => {
        badge.textContent = '✓ ¡Imagen detectada!';
        badge.classList.add('found');
        badge.classList.remove('lost');

        // Reproducir video con sonido
        const vid = document.getElementById('arVideo');
        vid.muted = isMuted;
        vid.play().catch(() => {
          vid.muted = true;
          isMuted = true;
          document.getElementById('muteBtn').textContent = '🔇';
          vid.play();
          showToast('Toca 🔊 para activar sonido');
        });

        showToast('¡Video AR activado! 🎉');
        setTimeout(() => badge.classList.remove('visible'), 2000);
      });

      target.addEventListener('targetLost', () => {
        badge.classList.add('visible');
        badge.textContent = '🔍 Buscando imagen...';
        badge.classList.remove('found');
        badge.classList.add('lost');

        // Pausar video
        const vid = document.getElementById('arVideo');
        vid.pause();
      });
    }
  }, 1000);
}

// ════════════════════════════════════════════
//  FALLBACK - SCANNER CON PHASH (sin .mind)
// ════════════════════════════════════════════
const HASH_SIZE = 16;
const MATCH_THRESHOLD = 0.68;
const FRAMES_TO_AVERAGE = 3;
let frameCanvas, frameCtx;
let detectionInterval;
let detecting = false;
let stream;

function normalizeImageData(data, length) {
  let min = 255, max = 0;
  for (let i = 0; i < length; i += 4) {
    const lum = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
    if (lum < min) min = lum;
    if (lum > max) max = lum;
  }
  const range = max - min || 1;
  const normalized = [];
  for (let i = 0; i < length; i += 4) {
    const lum = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
    normalized.push((lum - min) / range * 255);
  }
  return normalized;
}

function pHash(ctx, w, h) {
  const small = document.createElement('canvas');
  small.width = HASH_SIZE; small.height = HASH_SIZE;
  const sCtx = small.getContext('2d');
  sCtx.drawImage(ctx.canvas, 0, 0, w, h, 0, 0, HASH_SIZE, HASH_SIZE);
  const data = sCtx.getImageData(0, 0, HASH_SIZE, HASH_SIZE).data;
  const grays = normalizeImageData(data, data.length);
  const avg = grays.reduce((a, b) => a + b, 0) / grays.length;
  return grays.map(g => g > avg ? 1 : 0);
}

function hashSimilarity(a, b) {
  let same = 0;
  for (let i = 0; i < a.length; i++) if (a[i] === b[i]) same++;
  return same / a.length;
}

function generateHashVariations(canvas) {
  const ctx = canvas.getContext('2d');
  const hashes = [pHash(ctx, canvas.width, canvas.height)];
  const c2 = document.createElement('canvas');
  c2.width = 64; c2.height = 64;
  const c2x = c2.getContext('2d');
  c2x.drawImage(canvas, 6, 6, 52, 52, 0, 0, 64, 64);
  hashes.push(pHash(c2x, 64, 64));
  const c3 = document.createElement('canvas');
  c3.width = 64; c3.height = 64;
  const c3x = c3.getContext('2d');
  c3x.filter = 'contrast(150%) brightness(110%)';
  c3x.drawImage(canvas, 0, 0, 64, 64);
  hashes.push(pHash(c3x, 64, 64));
  return hashes;
}

async function startLegacyScanner(experiences) {
  // Crear pantalla de cámara simple
  const camHTML = `
    <div id="legacyView" style="position:fixed;inset:0;z-index:10;background:#000;">
      <video id="legacyCam" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;"></video>
      <canvas id="legacyCanvas" style="display:none;"></canvas>
    </div>
  `;
  document.getElementById('arScene').innerHTML = camHTML;
  document.getElementById('arScene').style.display = 'block';
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';

  const badge = document.getElementById('statusBadge');
  badge.classList.add('visible');
  badge.textContent = 'Cargando cámara...';

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }, audio: false
    });
    const cam = document.getElementById('legacyCam');
    cam.srcObject = stream;

    frameCanvas = document.getElementById('legacyCanvas');
    frameCtx = frameCanvas.getContext('2d');
    frameCanvas.width = 64; frameCanvas.height = 64;

    badge.textContent = 'Preparando detección...';

    // Pre-cargar hashes
    let expHashes = [];
    for (const exp of experiences) {
      const testCanvas = document.createElement('canvas');
      const testCtx = testCanvas.getContext('2d');
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = exp.imgURL;
      await new Promise(res => {
        img.onload = () => {
          testCanvas.width = 64; testCanvas.height = 64;
          testCtx.drawImage(img, 0, 0, 64, 64);
          expHashes.push({ exp, hashes: generateHashVariations(testCanvas) });
          res();
        };
        img.onerror = res;
      });
    }

    badge.textContent = 'Apunta a una imagen AR...';
    detecting = true;
    let frameBuffer = [];

    detectionInterval = setInterval(() => {
      if (!detecting) return;
      const vid = document.getElementById('legacyCam');
      if (!vid || vid.readyState < 2) return;

      frameCtx.drawImage(vid, 0, 0, 64, 64);
      const frameHash = pHash(frameCtx, 64, 64);
      frameBuffer.push(frameHash);
      if (frameBuffer.length > FRAMES_TO_AVERAGE) frameBuffer.shift();

      let bestScore = 0, bestExp = null;
      for (const { exp, hashes } of expHashes) {
        for (const refHash of hashes) {
          for (const fh of frameBuffer) {
            const score = hashSimilarity(refHash, fh);
            if (score > bestScore) { bestScore = score; bestExp = exp; }
          }
        }
      }

      const pct = Math.round(bestScore * 100);
      badge.textContent = `Escaneando… ${pct}%`;

      if (bestScore >= MATCH_THRESHOLD && bestExp) {
        badge.textContent = '✓ ¡Imagen detectada!';
        badge.classList.add('found');
        clearInterval(detectionInterval);
        detecting = false;

        payload = { ...bestExp };
        activateLegacyVideo();
      }
    }, 300);

  } catch(e) {
    showToast('No se pudo acceder a la cámara');
  }
}

function activateLegacyVideo() {
  const shape = payload.shape || 'none';
  const vidHTML = `
    <div id="legacyVideoWrap" style="
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width: ${['circle','hexagon','diamond','star'].includes(shape) ? 'min(85vw, 380px)' : 'min(90vw, 440px)'};
      height: ${['circle','hexagon','diamond','star'].includes(shape) ? 'min(85vw, 380px)' : 'auto'};
      ${shape === 'circle' ? 'border-radius:50%;overflow:hidden;' : ''}
      ${shape === 'rounded' ? 'border-radius:24px;overflow:hidden;' : ''}
      ${shape === 'hexagon' ? 'clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);' : ''}
      ${shape === 'diamond' ? 'clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);' : ''}
      ${shape === 'star' ? 'clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);' : ''}
      box-shadow: 0 0 60px rgba(177,76,245,0.5);
    ">
      <video id="overlayVid" src="${payload.vidURL}" autoplay loop playsinline
        style="width:100%;height:100%;object-fit:cover;" crossorigin="anonymous">
      </video>
    </div>
  `;
  document.getElementById('legacyView').insertAdjacentHTML('beforeend', vidHTML);
  document.getElementById('hudName').textContent = payload.name;
  document.getElementById('hud').style.display = 'flex';
  showToast('¡Video AR activado! 🎉');

  const vid = document.getElementById('overlayVid');
  vid.muted = false;
  vid.play().catch(() => { vid.muted = true; vid.play(); showToast('Toca 🔊 para activar sonido'); });
}

// ════════════════════════════════════════════
//  CONTROLES
// ════════════════════════════════════════════
function toggleMute() {
  isMuted = !isMuted;
  const vid = document.getElementById('arVideo') || document.getElementById('overlayVid');
  if (vid) vid.muted = isMuted;
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
  showToast(isMuted ? 'Sonido desactivado' : 'Sonido activado');
}

function stopAR() {
  // Detener MindAR
  const scene = document.getElementById('mindScene');
  if (scene) scene.parentNode.removeChild(scene);

  // Detener legacy
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (detectionInterval) { clearInterval(detectionInterval); detecting = false; }

  document.getElementById('arScene').innerHTML = '';
  document.getElementById('arScene').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('statusBadge').classList.remove('visible');
  document.getElementById('startScreen').style.display = 'flex';

  const btn = document.getElementById('startBtn');
  btn.disabled = false;
  btn.textContent = '📸 Iniciar escaneo';
}

function showToast(msg, dur = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// Inicializar
loadExperience();
</script>
</body>
</html>
